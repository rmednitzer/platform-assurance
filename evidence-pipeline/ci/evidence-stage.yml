# Evidence generation stage for GitLab CI
# Add this stage to your .gitlab-ci.yml
# Prerequisites: cosign, syft, trivy, crane, mc (MinIO client) available in CI image

evidence:
  stage: evidence
  image: ${CI_REGISTRY}/ci-tools:latest
  variables:
    EVIDENCE_BUCKET: evidence
    EVIDENCE_PREFIX: ci/${CI_PROJECT_PATH}/${CI_PIPELINE_ID}
  script:
    # 1. Generate SBOM
    - syft ${IMAGE} -o cyclonedx-json > sbom-cdx.json
    - syft ${IMAGE} -o spdx-json > sbom-spdx.json

    # 2. Scan for vulnerabilities
    - trivy image --format json --output vuln-report.json ${IMAGE}

    # 3. Sign image (keyless via GitLab OIDC)
    - cosign sign --yes ${IMAGE}

    # 4. Attach and sign SBOM as OCI artifact
    - cosign attach sbom --sbom sbom-cdx.json ${IMAGE}
    - cosign attest --yes --predicate sbom-cdx.json --type cyclonedx ${IMAGE}

    # 5. Sign non-OCI evidence files
    - cosign blob-sign --yes --bundle vuln-report.bundle vuln-report.json

    # 6. Build evidence manifest
    - |
      cat > evidence-manifest.json <<EOF
      {
        "pipeline_id": "${CI_PIPELINE_ID}",
        "project": "${CI_PROJECT_PATH}",
        "commit": "${CI_COMMIT_SHA}",
        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
        "image_digest": "$(crane digest ${IMAGE})",
        "artifacts": {
          "sbom_cdx": "$(sha256sum sbom-cdx.json | cut -d' ' -f1)",
          "sbom_spdx": "$(sha256sum sbom-spdx.json | cut -d' ' -f1)",
          "vuln_report": "$(sha256sum vuln-report.json | cut -d' ' -f1)"
        }
      }
      EOF
    - cosign blob-sign --yes --bundle manifest.bundle evidence-manifest.json

    # 7. Upload to evidence store (MinIO WORM bucket)
    - mc cp --recursive ./ minio/${EVIDENCE_BUCKET}/${EVIDENCE_PREFIX}/

    # 8. Index in OpenSearch evidence catalogue
    - |
      HASH=$(sha256sum evidence-manifest.json | cut -d' ' -f1)
      curl -X POST "${OPENSEARCH_URL}/evidence-artifacts/_doc" \
        -H "Content-Type: application/json" \
        -d "{
          \"artifact_id\": \"$(uuidgen)\",
          \"artifact_type\": \"evidence_manifest\",
          \"source\": \"gitlab-ci\",
          \"project\": \"${CI_PROJECT_PATH}\",
          \"pipeline_id\": \"${CI_PIPELINE_ID}\",
          \"created_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
          \"sha256_hash\": \"${HASH}\",
          \"s3_bucket\": \"${EVIDENCE_BUCKET}\",
          \"s3_key\": \"${EVIDENCE_PREFIX}/evidence-manifest.json\",
          \"signing_method\": \"cosign-keyless\",
          \"retention_tier\": \"ci_3y\",
          \"framework_tags\": [\"NIS2\", \"CRA\"],
          \"description\": \"CI evidence for ${CI_PROJECT_PATH} pipeline ${CI_PIPELINE_ID}\"
        }"

  artifacts:
    paths:
      - sbom-cdx.json
      - sbom-spdx.json
      - vuln-report.json
      - evidence-manifest.json
      - "*.bundle"
    expire_in: never
